<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Technique</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-image: url("{{ url_for('static', filename='background1.jpg') }}"); /* Adjust path to your background image */
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            min-height: 100vh; /* Ensure full height of viewport */
        }
        .container {
            max-width: 800px; /* Increased width for a larger container */
            width: 100%;
            margin: 20px;
            padding: 20px;
            border: 1px solid #ccc;
            background-color: rgba(255, 255, 255, 0.7); /* Semi-transparent white background */
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2); /* Improved box shadow */
            border-radius: 10px; /* Rounded corners for a softer look */
	    animation: fadeIn 1s ease-in-out;
        }
	@keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
	}
        .button-container {
            margin-top: 20px;
        }
        .button-container button {
            padding: 12px 24px;
            font-size: 18px;
            background-color: #A9A9A9;
            color: black;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        .button-container button:hover {
            background-color: #808080;
        }
	.footer {
            margin-top: 20px;
            font-size: 1rem;
            color: black;
        }
	.footer a {
            color: black;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
	}
    </style>
</head>
<body>
    <div class="container">
        <h1>Select Compression Technique</h1>
        <form action="/select_technique" method="POST" class="button-container">
            <button type="submit" name="technique" value="PCA">PCA</button><br><br>
            <button type="submit" name="technique" value="SVD">SVD</button><br><br>
            <button type="submit" name="technique" value="ICA">ICA</button><br><br>
        </form>
    </div>
    <div class="footer">
        &copy; <a href="{{ url_for('technique') }}">2024 Sahil Khair.</a>
    </div>
</body>
</html>
