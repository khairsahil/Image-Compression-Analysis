<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Compression using {{ technique }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-image: url("{{ url_for('static', filename='background1.jpg') }}"); /* Adjust path to your background image */
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            width: 100%;
            margin: 20px;
            padding: 20px;
            border: 1px solid #ccc;
            background-color: rgba(255, 255, 255, 0.7);
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            animation: fadeIn 1s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .container h1 {
            margin-bottom: 20px;
            font-size: 2rem;
            color: #333;
        }
        .image-container {
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .image-container div {
            flex: 1;
            margin: 10px;
        }
        .image-container img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            border-radius: 10px;
            transition: transform 0.3s ease;
        }
        .image-container img:hover {
            transform: scale(1.05);
        }
        .slider {
            width: 100%;
            margin-bottom: 10px;
        }
        .button-container {
            margin-top: 20px;
        }
        .button-container button {
            padding: 12px 24px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        .button-container button:hover {
            background-color: #3D8C40;
        }
        input[type="file"] {
            display: none;
        }
        .upload-button {
            background-color: #008CBA;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .upload-button:hover {
            background-color: #006080;
        }
        .compress-button {
            background-color: #008CBA;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .compress-button:hover {
            background-color: #006080;
        }
        .psnr {
            margin-top: 20px;
            font-size: 18px;
        }
        .footer {
            margin-top: 20px;
            font-size: 1rem;
            color: black;
        }
	.footer a {
            color: black;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
	}
        .loading-spinner {
            display: none;
            border: 8px solid #f3f3f3;
            border-top: 8px solid #3498db;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 2s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Image Compression using {{ technique }}</h1><br>
        <label for="imageUpload" class="upload-button">Upload Image</label>
        <input type="file" id="imageUpload" accept="image/*">
        <div class="image-container">
            <div>
                <h3>Original Image</h3>
                <img id="imagePreview" class="image-preview" src="#" alt="Image Preview" style="display:none;">
            </div>
            <div>
                <h3>Compressed Image</h3>
                <img id="compressedImage" class="image-preview" src="#" alt="Compressed Image" style="display:none;">
            </div>
        </div>
        <label for="components">Number of Components:</label>
        <input type="range" id="components" name="components" min="1" max="100" class="slider">
        <span id="componentValue">50</span><br><br>
        <label onclick="compressImage()" class="compress-button">Compress Image</label>
        <div class="psnr" id="psnrValue" style="display:none;"></div>
        <div class="loading-spinner" id="loadingSpinner"></div>
        <div class="button-container">
            <a id="downloadLink" href="#" style="display:none;" download="compressed.jpg">
                <button id="downloadButton" style="display:none;">Download Compressed Image</button>
            </a>
            <a href="{{ url_for('select_technique') }}"><button>Back to Home</button></a>
        </div>
    </div>
    <div class="footer">
        &copy; <a href="{{ url_for('technique') }}">2024 Sahil Khair.</a>
    </div>
    <script>
        const imageUpload = document.getElementById('imageUpload');
        const imagePreview = document.getElementById('imagePreview');
        const compressedImage = document.getElementById('compressedImage');
        const componentSlider = document.getElementById('components');
        const componentValue = document.getElementById('componentValue');
        const downloadLink = document.getElementById('downloadLink');
        const downloadButton = document.getElementById('downloadButton');
        const psnrValue = document.getElementById('psnrValue');
        const loadingSpinner = document.getElementById('loadingSpinner');

        imageUpload.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    imagePreview.style.display = 'block';
                }
                reader.readAsDataURL(file);

                const img = new Image();
                img.onload = function() {
                    const maxComponents = Math.min(img.width * img.height, 100);
                    componentSlider.max = maxComponents;
                    componentSlider.value = Math.min(50, maxComponents);
                    componentValue.textContent = componentSlider.value;
                }
                img.src = URL.createObjectURL(file);
            }
        });

        componentSlider.oninput = function() {
            componentValue.textContent = this.value;
        }

        async function compressImage() {
            loadingSpinner.style.display = 'block'; // Show loading spinner
            const formData = new FormData();
            formData.append('technique', '{{ technique }}');
            formData.append('image', imageUpload.files[0]);
            formData.append('components', componentSlider.value);

            const response = await fetch('/compress', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                const data = await response.json();
                const { image, psnr } = data;

                compressedImage.src = 'data:image/jpeg;base64,' + image;
                compressedImage.style.display = 'block';

                psnrValue.textContent = `PSNR: ${psnr.toFixed(2)}`;
                psnrValue.style.display = 'block';
                
                downloadLink.href = compressedImage.src;
                downloadLink.style.display = 'inline-block';
                downloadButton.style.display = 'inline-block';
            }
            loadingSpinner.style.display = 'none'; // Hide loading spinner
        }
    </script>
</body>
</html>
